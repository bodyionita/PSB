# Production topology on the VPS (07-infrastructure.md). Dormant until the provisioning
# session (ADR-012). Postgres is Supabase (managed, off-box) — not a service here.
#
#   docker compose up -d --build
#
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Only the domain — NOT the app secrets (env_file) — reaches the edge TLS
      # terminator. Interpolated from deploy/.env via `compose --env-file` (ADR-016).
      BRAINDAN_DOMAIN: ${BRAINDAN_DOMAIN:-localhost}
    ports:
      # :443 only — Cloudflare (Full strict) connects over HTTPS; the edge does HTTP->HTTPS.
      # No :80: origin ACME is not used (explicit Origin CA cert, ADR-017) and UFW blocks 80.
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./origin.crt:/etc/caddy/origin.crt:ro   # Cloudflare Origin CA cert (CI-rendered, ADR-017)
      - ./origin.key:/etc/caddy/origin.key:ro   # Cloudflare Origin CA key  (CI-rendered, ADR-017)
      - ../web/dist:/srv/web:ro          # static PWA build, served at /
      - caddy_data:/data
      - caddy_config:/config

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      # raw = no interpolation: the $-laden argon2 hash and other secrets pass to the
      # container literally. Without this, Compose parses "$argon2id$v=19$m=..." as
      # variables and blanks them, corrupting API_PASSWORD_HASH (and login).
      - path: .env
        format: raw
    environment:
      ENABLE_SCHEDULER: "true"           # exactly one instance; there is only one (ADR-003)
    volumes:
      - /srv/vault:/srv/vault            # vault git repo (source of truth, ADR-001)
      - /srv/data:/srv/data              # raw audio files (never lost, invariant 5)
      - claude_creds:/root/.claude       # Claude Max OAuth (claude login), persisted
      # Vault deploy key (generated by provision.sh, host-owned) — read-only; the entrypoint
      # copies it to a root-owned 0600 path so SSH accepts it for the vault push (ADR-014).
      - /home/deploy/.ssh/vault_deploy_key:/run/vault_deploy_key:ro
    expose:
      - "8000"

volumes:
  caddy_data:
  caddy_config:
  claude_creds:
