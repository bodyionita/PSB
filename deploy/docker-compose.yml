# Production topology on the VPS (07-infrastructure.md). Dormant until the provisioning
# session (ADR-012). Postgres is Supabase (managed, off-box) — not a service here.
#
#   docker compose up -d --build
#
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Only the domain — NOT the app secrets (env_file) — reaches the edge TLS
      # terminator. Interpolated from deploy/.env via `compose --env-file` (ADR-016).
      BRAINDAN_DOMAIN: ${BRAINDAN_DOMAIN:-localhost}
    ports:
      # :443 only — Cloudflare (Full strict) connects over HTTPS; the edge does HTTP->HTTPS.
      # No :80: origin ACME is not used (explicit Origin CA cert, ADR-017) and UFW blocks 80.
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./origin.crt:/etc/caddy/origin.crt:ro   # Cloudflare Origin CA cert (CI-rendered, ADR-017)
      - ./origin.key:/etc/caddy/origin.key:ro   # Cloudflare Origin CA key  (CI-rendered, ADR-017)
      - ../web/dist:/srv/web:ro          # static PWA build, served at /
      - caddy_data:/data
      - caddy_config:/config

  # Self-hosted embeddings sidecar (M2, ADR-022): nomic-embed-text over an OpenAI-compatible
  # /v1/embeddings on the internal network. Not exposed off-box (no published port). The model
  # is pulled automatically by the ollama-init one-shot below — no manual `ollama pull` step.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama   # model blobs persist across redeploys (no re-pull)
    expose:
      - "11434"
    healthcheck:
      # `ollama list` succeeds only once the daemon is serving — gates ollama-init below.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12          # ~2 min budget for a cold container start
      start_period: 20s

  # One-shot model provisioner (M2, ADR-022): pulls the embedding model into the shared
  # ollama_models volume, then exits. Runs on every `up`, so it is **self-healing** — a fresh
  # VPS or a recreated volume re-provisions the model with zero manual intervention. Idempotent:
  # `ollama pull` is a fast no-op once the blobs are present. Pull is issued to the ollama server
  # over the network (OLLAMA_HOST), which downloads into its own volume, so no volume mount here.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["/bin/sh", "-c"]
    # Model name comes from the same EMBEDDING_MODEL used by the app (deploy/defaults.env via
    # `compose --env-file`); the default keeps a bare `docker compose up` working too.
    command: ["ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      # Start ordering only — the app tolerates ollama-not-ready (index step retries; ADR-022).
      - ollama
    env_file:
      # raw = no interpolation: the $-laden argon2 hash and other secrets pass to the
      # container literally. Without this, Compose parses "$argon2id$v=19$m=..." as
      # variables and blanks them, corrupting API_PASSWORD_HASH (and login).
      - path: .env
        format: raw
    environment:
      ENABLE_SCHEDULER: "true"           # exactly one instance; there is only one (ADR-003)
    volumes:
      - /srv/graph-store:/srv/graph-store  # graph-store git repo (source of truth, ADR-001/026)
      - /srv/data:/srv/data              # raw audio files (never lost, invariant 5)
      - claude_creds:/root/.claude       # Claude Max OAuth (claude login), persisted
      # Graph-store deploy key (generated by provision.sh, host-owned) — read-only; the entrypoint
      # copies it to a root-owned 0600 path so SSH accepts it for the graph-store push (ADR-014).
      - /home/deploy/.ssh/graph_store_deploy_key:/run/graph_store_deploy_key:ro
    expose:
      - "8000"

volumes:
  caddy_data:
  caddy_config:
  claude_creds:
  ollama_models:
