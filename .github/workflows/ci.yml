# CI — per-directory pipelines with path filters (ADR-006: server/web share nothing).
# Deploy-on-main is written now but dormant until the provisioning session (ADR-012):
# it no-ops unless the VPS_* secrets exist.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    # Backstop for .githooks/pre-commit (which is local + --no-verify-bypassable).
    # Scans the repo/history for committed credentials; see 09-session-protocol.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner -v

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --frozen || uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q     # no live LLMs/DB — fakes only (08 testing policy)

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from web/package.json "packageManager" (Corepack).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build        # tsc (strict) + vite production build

  deploy:
    # CI is the sole writer of deploy/.env (ADR-016): render defaults.env + GitHub
    # secrets -> scp to VPS (mode 600) -> compose up. Dormant until VPS_HOST is set.
    needs: [server, web, secrets]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production          # secrets live in the "production" environment
    env:
      HAVE_VPS: ${{ secrets.VPS_HOST != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Render deploy/.env (defaults.env + secrets), base64 for transport
        if: env.HAVE_VPS == 'true'
        run: |
          umask 077
          cp deploy/defaults.env deploy/.env.rendered
          {
            echo "API_PASSWORD_HASH=${{ secrets.API_PASSWORD_HASH }}"
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "NEBIUS_API_KEY=${{ secrets.NEBIUS_API_KEY }}"
            echo "SLACK_USER_TOKEN=${{ secrets.SLACK_USER_TOKEN }}"
            echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}"
            echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}"
            echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}"
          } >> deploy/.env.rendered
          # Redirect to $GITHUB_ENV (not stdout) so nothing is logged.
          echo "ENV_B64=$(base64 -w0 deploy/.env.rendered)" >> "$GITHUB_ENV"
          rm -f deploy/.env.rendered

      - name: Deploy — write /srv/app/deploy/.env (600), pull, build, migrate
        if: env.HAVE_VPS == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_B64
          script: |
            set -e
            cd /srv/app
            git pull --ff-only
            umask 077
            printf '%s' "$ENV_B64" | base64 -d > deploy/.env
            chmod 600 deploy/.env
            docker compose -f deploy/docker-compose.yml up -d --build
            docker compose -f deploy/docker-compose.yml exec -T api uv run alembic upgrade head

      - name: Dormant notice
        if: env.HAVE_VPS != 'true'
        run: echo "VPS_HOST secret not set — deploy is dormant (ADR-012/016)."
