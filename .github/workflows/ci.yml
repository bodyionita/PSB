# CI — per-directory pipelines with path filters (ADR-006: server/web share nothing).
# Deploy-on-main is written now but dormant until the provisioning session (ADR-012):
# it no-ops unless the VPS_* secrets exist.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual "Run workflow" — lets provisioning trigger a deploy
                            # without a code change (referenced by deploy/provision.sh).

jobs:
  secrets:
    # Backstop for .githooks/pre-commit (which is local + --no-verify-bypassable).
    # Scans the repo/history for committed credentials; see 09-session-protocol.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner -v

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      # ruff/pytest live in the `dev` extra ([project.optional-dependencies]); plain
      # `uv sync` installs only main deps, so the dev extra must be requested explicitly.
      - run: uv sync --extra dev --frozen || uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q     # no live LLMs/DB — fakes only (08 testing policy)

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup is a `uses:` step, so it ignores this job's working-directory and
      # can't read web/package.json's "packageManager" — pin the version to match it (9.15.0).
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build        # tsc (strict) + vite production build
      - name: Upload web build for the deploy job (Caddy serves this statically)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  deploy:
    # CI is the sole writer of deploy/.env (ADR-016): render defaults.env + GitHub
    # secrets -> scp to VPS (mode 600) -> compose up. Dormant until VPS_HOST is set.
    needs: [server, web, secrets]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production          # secrets live in the "production" environment
    env:
      HAVE_VPS: ${{ secrets.VPS_HOST != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download the web build (from the web job) -> web/dist
        if: env.HAVE_VPS == 'true'
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Render deploy/.env + origin TLS files (defaults.env + secrets)
        if: env.HAVE_VPS == 'true'
        env:                          # values as env vars — NOT substituted into the script
          API_PASSWORD_HASH: ${{ secrets.API_PASSWORD_HASH }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ORIGIN_CERT_PEM: ${{ secrets.ORIGIN_CERT_PEM }}
          ORIGIN_KEY_PEM: ${{ secrets.ORIGIN_KEY_PEM }}
        run: |
          # No restrictive umask here: appleboy/scp-action tars these as a different
          # container user, so 600 -> "Permission denied". The runner is ephemeral and
          # single-tenant; the real lock-down (mode 600) is applied on the VPS by the
          # deploy step's `chmod 600`. Keep them group/other-readable so scp can pack them.
          cp deploy/defaults.env deploy/.env
          # printf %s writes each value literally — safe for $, %, backticks in
          # Argon2 hashes / DB URLs (the shell never re-parses the value).
          {
            printf 'API_PASSWORD_HASH=%s\n'    "$API_PASSWORD_HASH"
            printf 'SESSION_SECRET=%s\n'       "$SESSION_SECRET"
            printf 'DATABASE_URL=%s\n'         "$DATABASE_URL"
            printf 'OPENAI_API_KEY=%s\n'       "$OPENAI_API_KEY"
            printf 'NEBIUS_API_KEY=%s\n'       "$NEBIUS_API_KEY"
            printf 'SLACK_USER_TOKEN=%s\n'     "$SLACK_USER_TOKEN"
            printf 'R2_ACCOUNT_ID=%s\n'        "$R2_ACCOUNT_ID"
            printf 'R2_ACCESS_KEY_ID=%s\n'     "$R2_ACCESS_KEY_ID"
            printf 'R2_SECRET_ACCESS_KEY=%s\n' "$R2_SECRET_ACCESS_KEY"
          } >> deploy/.env
          # Origin CA cert/key as files (multi-line PEM), NOT .env keys (ADR-017).
          # printf %s writes the PEM literally; trailing newline is harmless to Caddy.
          printf '%s\n' "$ORIGIN_CERT_PEM" > deploy/origin.crt
          printf '%s\n' "$ORIGIN_KEY_PEM" > deploy/origin.key
          # Readable on the ephemeral runner so scp-action's container can pack them;
          # secured to 600 on the VPS by the deploy step.
          chmod 644 deploy/.env deploy/origin.crt deploy/origin.key
          # Diagnostic only (names/sizes/perms — no secret content is printed).
          ls -l deploy/.env deploy/origin.crt deploy/origin.key

      - name: "Copy rendered .env + origin TLS files to the VPS (ADR-016/017 scp-of-a-file)"
        if: env.HAVE_VPS == 'true'
        uses: appleboy/scp-action@v0.1.7   # verify tag at go-live; job is dormant until then
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/.env,deploy/origin.crt,deploy/origin.key"   # -> /srv/app/deploy/<file>
          target: /srv/app
          overwrite: true

      - name: Copy the built PWA to the VPS (Caddy serves /srv/app/web/dist)
        if: env.HAVE_VPS == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: web/dist              # path preserved -> /srv/app/web/dist
          target: /srv/app
          overwrite: true

      - name: Deploy — secure perms, pull, build, migrate
        if: env.HAVE_VPS == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/app
            chmod 600 deploy/.env deploy/origin.crt deploy/origin.key
            git pull --ff-only
            docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --build
            docker compose -f deploy/docker-compose.yml exec -T api uv run alembic upgrade head

      - name: Dormant notice
        if: env.HAVE_VPS != 'true'
        run: echo "VPS_HOST secret not set — deploy is dormant (ADR-012/016)."
